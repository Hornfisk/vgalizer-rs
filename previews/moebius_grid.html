<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>moebius_grid</title>
<!--
  moebius_grid · Cartesian grid in the complex plane mapped through a
  Möbius transformation w = (a·z + b) / (c·z + d). Only the warped grid
  lines are drawn — the screen is mostly black with thin acid-green
  filaments that pinch, twist and rotate as the coefficients drift.
  Bass drives the magnitude of c (the "pole strength"), the whole image
  rotates with time, beats kick a brief swirl.

  Planned in-engine params (param 0..5):
    0  grid_density  4..16        9     grid lines per axis
    1  pole_strength 0.05..0.60   0.25  |c|, controls how aggressive the warp is
    2  drift_speed  -1.0..1.0     0.30  speed of coefficient drift
    3  rot_speed    -1.0..1.0     0.15  global rotation
    4  hue           0.0..1.0     0.30  green / cyan / amber lean
    5  thickness     0.5..3.0     1.4   line thickness (px)
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; font-family: ui-monospace, Menlo, monospace; color:#9ad; }
  canvas { display:block; width:100vw; height:100vh; }
  #hint {
    position: fixed; left: 12px; bottom: 10px;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    opacity: 0.85; transition: opacity 1.2s ease;
    text-shadow: 0 0 6px #000;
    pointer-events: none;
  }
  #hint.gone { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">moebius_grid &middot; click / space = beat</div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias:false, alpha:false, premultipliedAlpha:false });
if (!gl) { document.body.textContent = 'WebGL2 not available.'; throw new Error('no webgl2'); }

const VS = `#version 300 es
in vec2 a_pos;
void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }`;

// Strategy: for each pixel `w` we apply the inverse Möbius
// z = (d·w - b) / (-c·w + a) — that gives us the original Cartesian
// coordinate, where we just check distance to the nearest grid line.
// This avoids any forward-rendering of polylines.
const FS = `#version 300 es
precision highp float;
out vec4 fragColor;

uniform vec2  u_res;
uniform float u_time;
uniform float u_pulse;
uniform float u_bands[8];

#define PI 3.14159265359

// Complex helpers
vec2 cmul(vec2 a, vec2 b){ return vec2(a.x*b.x - a.y*b.y, a.x*b.y + a.y*b.x); }
vec2 cdiv(vec2 a, vec2 b){
  float den = dot(b,b) + 1e-6;
  return vec2(a.x*b.x + a.y*b.y, a.y*b.x - a.x*b.y) / den;
}

void main(){
  vec2 res = u_res;
  vec2 w = (gl_FragCoord.xy - 0.5*res) / min(res.x, res.y);

  // Global rotation
  float rot = u_time * 0.15;
  float cs = cos(rot), sn = sin(rot);
  w = mat2(cs, -sn, sn, cs) * w;

  // Drifting Möbius coefficients (a, b, c, d) as complex numbers
  float t = u_time * 0.30;
  vec2 a = vec2(1.0, 0.0);
  vec2 b = vec2(0.20 * sin(t * 0.7), 0.20 * cos(t * 0.9));
  // Bass-driven pole strength
  float bass = u_bands[0] + 0.5 * u_bands[1];
  float poleMag = 0.20 + 0.30 * bass + 0.10 * u_pulse;
  vec2 c = vec2(poleMag * cos(t),       poleMag * sin(t));
  vec2 d = vec2(1.0 + 0.10 * sin(t*1.3), 0.10 * cos(t*1.1));

  // Inverse Möbius: z = (d·w - b) / (-c·w + a)
  vec2 num = cmul(d, w) - b;
  vec2 den = -cmul(c, w) + a;
  vec2 z = cdiv(num, den);

  // Distance to the nearest grid line in z-space (Cartesian).
  // Use fwidth on z so the line stays ~constant in screen pixels even where
  // the warp stretches space. Density bumped way up so the warped figure
  // shows many filaments at once instead of two cross-hairs.
  float density = 5.0;
  vec2 g = z * density;
  vec2 fr = abs(fract(g) - 0.5);
  vec2 fw = fwidth(g) + 1e-5;

  // Major grid (every line)
  float lineX = 1.0 - smoothstep(0.0, fw.x * 1.4, fr.x);
  float lineY = 1.0 - smoothstep(0.0, fw.y * 1.4, fr.y);

  // Fine subgrid: 5× denser, dimmer — adds detail in unstretched zones
  vec2 g2 = z * density * 5.0;
  vec2 fr2 = abs(fract(g2) - 0.5);
  vec2 fw2 = fwidth(g2) + 1e-5;
  float subX = (1.0 - smoothstep(0.0, fw2.x * 1.4, fr2.x)) * 0.35;
  float subY = (1.0 - smoothstep(0.0, fw2.y * 1.4, fr2.y)) * 0.35;

  // Fade lines that are wildly stretched (interior of strong distortion areas
  // would otherwise smear into a haze)
  float stretch = clamp(1.0 - 0.015 * length(fw), 0.15, 1.0);
  float lines = max(max(lineX, lineY), max(subX, subY)) * stretch;

  // Acid green tint with a slight cyan kick on beat
  vec3 green = vec3(0.30, 1.00, 0.45);
  vec3 cyan  = vec3(0.30, 0.95, 1.00);
  vec3 tint = mix(green, cyan, 0.25 + 0.30 * u_pulse);

  vec3 col = tint * lines;
  // White core
  col += vec3(lines * lines) * 0.55;

  // Pole glow: where |den| → 0 there is a pole; show as soft halo
  float poleD = length(den);
  col += tint * 0.15 * exp(-poleD * 6.0);

  // Vignette
  float vd = length(w);
  col *= smoothstep(1.2, 0.2, vd);

  col = 1.0 - exp(-col * 1.4);
  col = pow(col, vec3(0.92));
  fragColor = vec4(col, 1.0);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw new Error('shader compile failed');
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.bindAttribLocation(prog, 0, 'a_pos');
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
  throw new Error('link failed');
}

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

const u_res    = gl.getUniformLocation(prog, 'u_res');
const u_time   = gl.getUniformLocation(prog, 'u_time');
const u_pulse  = gl.getUniformLocation(prog, 'u_pulse');
const u_bands  = gl.getUniformLocation(prog, 'u_bands[0]');

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
  }
}
window.addEventListener('resize', resize);
resize();

let pulse = 0;
function triggerBeat() { pulse = 1.0; }
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); triggerBeat(); }
});
window.addEventListener('mousedown', () => triggerBeat());
window.addEventListener('touchstart', () => triggerBeat(), {passive:true});

const hint = document.getElementById('hint');
setTimeout(() => hint.classList.add('gone'), 3000);

const start = performance.now();
let prev = start;
let nextAutoBeat = 0;
const BPM = 124;
const beatInterval = 60.0 / BPM;

function frame(now) {
  const t = (now - start) * 0.001;
  const dt = (now - prev) * 0.001;
  prev = now;

  if (t >= nextAutoBeat) {
    triggerBeat();
    nextAutoBeat = (nextAutoBeat === 0 ? t : nextAutoBeat) + beatInterval;
    if (nextAutoBeat < t) nextAutoBeat = t + beatInterval;
  }
  const decayPerSec = Math.pow(0.92, 60);
  pulse *= Math.pow(decayPerSec, dt);

  const bands = new Float32Array(8);
  for (let i=0;i<8;i++){
    let v = 0.5 + 0.5*Math.sin(t*(i+1)*0.9 + i*1.3);
    v *= 0.5 + 0.7*Math.max(0, Math.sin(t*2.0 + i*0.5));
    v += pulse * 0.4 * (0.6 + 0.4*Math.sin(i*1.1));
    bands[i] = Math.max(0, Math.min(1, v));
  }

  resize();
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.useProgram(prog);
  gl.uniform2f(u_res, canvas.width, canvas.height);
  gl.uniform1f(u_time, t);
  gl.uniform1f(u_pulse, pulse);
  gl.uniform1fv(u_bands, bands);

  gl.bindVertexArray(vao);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
