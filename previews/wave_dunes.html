<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>wave_dunes</title>
<!--
  wave_dunes · Stacked horizontal waveform traces, scrolling upward into a
  red horizon. The current waveform is the bright white line at the bottom;
  older snapshots scroll up, shrinking and tinting deep red. Pure waterfall
  vector scope — feels like sand dunes drifting toward the horizon.

  Implementation note: rather than a history ring buffer (which starts blank
  and looks dead for the first second), each row's waveform is computed
  directly from the current bands with a row-dependent time phase. Older
  rows just use a delayed phase, so the same waveforms naturally appear to
  scroll upward.

  Planned in-engine params (param 0..5):
    0  row_count     12..56       40    number of stacked waveform rows
    1  scroll_rate    0.5..6.0    2.4   how fast row phase delay accumulates
    2  amp            0.02..0.30  0.10  waveform vertical amplitude
    3  perspective    0.5..3.0    1.7   row spacing curve toward horizon
    4  horizon        0.40..0.95  0.85  Y of the topmost (oldest) row
    5  wave_density   1..8        4     number of harmonics summed in each row
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; font-family: ui-monospace, Menlo, monospace; color:#9ad; }
  canvas { display:block; width:100vw; height:100vh; }
  #hint {
    position: fixed; left: 12px; bottom: 10px;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    opacity: 0.85; transition: opacity 1.2s ease;
    text-shadow: 0 0 6px #000;
    pointer-events: none;
  }
  #hint.gone { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">wave_dunes &middot; click / space = beat</div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias:false, alpha:false, premultipliedAlpha:false });
if (!gl) { document.body.textContent = 'WebGL2 not available.'; throw new Error('no webgl2'); }

const VS = `#version 300 es
in vec2 a_pos;
void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }`;

const FS = `#version 300 es
precision highp float;
out vec4 fragColor;

uniform vec2  u_res;
uniform float u_time;
uniform float u_level;
uniform float u_pulse;
uniform float u_bands[8];

#define ROWS 40
#define PI   3.14159265359

// Waveform value at horizontal x for row i. We give each row its own delayed
// phase so older rows look like a snapshot of the wave a moment earlier — the
// stack appears to scroll upward without any history buffer.
float waveAt(int i, float x) {
  float rowDelay = float(i) * 0.085;
  float t = u_time - rowDelay;
  float w = 0.0;
  for (int b = 0; b < 8; ++b) {
    float fr    = (float(b) + 1.0) * 1.4;
    float phase = float(b) * 1.7 + t * (0.6 + float(b) * 0.18);
    w += u_bands[b] * sin(x * fr * PI + phase);
  }
  return w * 0.18;
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  float x = (p.x - 0.5) * 2.0 * aspect;

  vec3 col = vec3(0.0);

  float bottomY  = 0.08;
  float horizonY = 0.85;
  float aa = 1.4 / u_res.y;

  for (int i = 0; i < ROWS; ++i) {
    float ti = float(i) / float(ROWS);
    // Non-linear receding: rows further back are squeezed together
    float yRow = mix(bottomY, horizonY, 1.0 - pow(1.0 - ti, 1.7));

    float w = waveAt(i, x);
    // Newer rows have stronger amplitude
    float amp = mix(0.075, 0.012, ti);
    float yLine = yRow + w * amp;

    float d = abs(p.y - yLine);
    if (d > 0.014) continue;

    float wL = 1.0 - smoothstep(aa * 0.4, aa * 1.8, d);
    if (wL < 0.001) continue;

    // Colour: white at front → amber → deep red at horizon
    vec3 cFront = vec3(1.00, 1.00, 1.00);
    vec3 cMid   = vec3(1.00, 0.55, 0.10);
    vec3 cBack  = vec3(0.55, 0.05, 0.00);
    vec3 c = (ti < 0.5)
      ? mix(cFront, cMid, ti * 2.0)
      : mix(cMid,   cBack, (ti - 0.5) * 2.0);

    float brighten = 1.0 + u_pulse * (1.0 - ti) * 0.9;
    col = max(col, c * wL * brighten);
  }

  // Subtle horizon glow
  float horiD = abs(p.y - horizonY);
  col += vec3(0.30, 0.04, 0.02) * exp(-horiD * 60.0) * 0.4;

  // Vignette
  float vd = length(p - vec2(0.5));
  col *= smoothstep(1.0, 0.2, vd);

  col = pow(col, vec3(0.92));
  fragColor = vec4(col, 1.0);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw new Error('shader compile failed');
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.bindAttribLocation(prog, 0, 'a_pos');
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
  throw new Error('link failed');
}

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

const u_res    = gl.getUniformLocation(prog, 'u_res');
const u_time   = gl.getUniformLocation(prog, 'u_time');
const u_level  = gl.getUniformLocation(prog, 'u_level');
const u_pulse  = gl.getUniformLocation(prog, 'u_pulse');
const u_bands  = gl.getUniformLocation(prog, 'u_bands[0]');

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
  }
}
window.addEventListener('resize', resize);
resize();

let pulse = 0;
let lastBeatT = 0;
function triggerBeat(t) { pulse = 1.0; lastBeatT = t; }
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); triggerBeat(performance.now()*0.001); }
});
window.addEventListener('mousedown', () => triggerBeat(performance.now()*0.001));
window.addEventListener('touchstart', () => triggerBeat(performance.now()*0.001), {passive:true});

const hint = document.getElementById('hint');
setTimeout(() => hint.classList.add('gone'), 3000);

const start = performance.now();
let prev = start;
let nextAutoBeat = 0;
const BPM = 126;
const beatInterval = 60.0 / BPM;

function frame(now) {
  const t = (now - start) * 0.001;
  const dt = (now - prev) * 0.001;
  prev = now;

  let level = 0.5 + 0.4*Math.sin(t*0.7) + 0.1*Math.sin(t*3.1);
  level = Math.max(0, Math.min(1, level));

  if (t >= nextAutoBeat) {
    triggerBeat(t);
    nextAutoBeat = (nextAutoBeat === 0 ? t : nextAutoBeat) + beatInterval;
    if (nextAutoBeat < t) nextAutoBeat = t + beatInterval;
  }
  const decayPerSec = Math.pow(0.92, 60);
  pulse *= Math.pow(decayPerSec, dt);

  const bands = new Float32Array(8);
  for (let i=0;i<8;i++){
    let v = 0.5 + 0.5*Math.sin(t*(i+1)*1.0 + i*1.3);
    v *= 0.5 + 0.7*Math.max(0, Math.sin(t*2.0 + i*0.5));
    v += pulse * 0.4 * (0.6 + 0.4*Math.sin(i*1.1));
    bands[i] = Math.max(0, Math.min(1, v));
  }

  resize();
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.useProgram(prog);
  gl.uniform2f(u_res, canvas.width, canvas.height);
  gl.uniform1f(u_time, t);
  gl.uniform1f(u_level, level);
  gl.uniform1f(u_pulse, pulse);
  gl.uniform1fv(u_bands, bands);

  gl.bindVertexArray(vao);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
