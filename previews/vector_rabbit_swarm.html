<!--
  vector_rabbit_swarm · Thin SVG-derived rabbit OUTLINE, drawn as many
  scaled copies expanding outward and swirling around centre. Inner copy
  is the original size, outer copies grow and rotate slowly. Audio:
  bass swells overall scale, mids drive swirl speed, beat re-injects new
  outer copies (brightness pulse on rim).

  Planned in-engine params (param 0..5):
    0  copies      4..32         18    number of concentric copies
    1  growth      1.05..1.40    1.18  scale ratio between successive copies
    2  swirl       0.0..1.5      0.45  swirl angular velocity
    3  jitter      0.0..0.04     0.005 per-vertex breathing jitter
    4  fade        0.2..1.0      0.55  outer copy alpha falloff
    5  bass_swell  0.0..0.5      0.18  uniform scale on bass
-->

  3702,3663,
]);
const EDGE_COUNT = 3702;


const COPIES = 18;
const GROWTH = 1.18;

const VS = `#version 300 es
in vec2 a_pos;
uniform float u_time;
uniform float u_pulse;
uniform float u_aspect;
uniform float u_bands[8];
uniform float u_growth;
uniform float u_swirl;
uniform float u_bass_swell;
uniform float u_jitter;
flat out int v_inst;

float hash11(float n){ return fract(sin(n) * 43758.5453); }

void main(){
  int inst = gl_InstanceID;
  float fi = float(inst);
  float total = float(18);

  // Each copy: scale grows geometrically, rotates with phase offset
  float scale = pow(u_growth, fi - total * 0.5);
  // Bass uniform swell on top
  scale *= 1.0 + u_bass_swell * (u_bands[0] + 0.5 * u_bands[1]);

  // Swirl: outer copies rotate faster, plus a slow per-instance phase
  float baseAng = u_time * (0.08 + 0.04 * u_bands[3]);
  float ang = baseAng * (1.0 + 0.3 * fi) + fi * 0.42 + u_swirl * sin(u_time * 0.4 + fi * 0.7);

  vec2 p = a_pos;

  // Tiny per-vertex jitter so the outline shimmers
  float h1 = hash11(p.x * 311.7 + p.y * 127.1 + fi * 7.1);
  float h2 = hash11(p.x * 731.5 + p.y * 451.3 + fi * 13.7);
  vec2 jit = (vec2(h1, h2) - 0.5) * (u_jitter + 0.01 * u_pulse);
  p += jit;

  // Apply scale, then rotation around origin
  p *= scale;
  float c = cos(ang), s = sin(ang);
  p = mat2(c, -s, s, c) * p;

  // Aspect correction + global fit
  p.x /= u_aspect;
  p *= 0.5;

  v_inst = inst;
  gl_Position = vec4(p, 0.0, 1.0);
}`;

const FS = `#version 300 es
precision highp float;
flat in int v_inst;
out vec4 fragColor;
uniform float u_pulse;
uniform float u_fade;
uniform int u_total;
void main(){
  float fi = float(v_inst);
  float total = float(u_total);
  // Centre copy (inst near total/2) is brightest white;
  // outer copies fade and tint cyan
  float dist_from_centre = abs(fi - total * 0.5) / (total * 0.5);
  float alpha = mix(1.0, u_fade * 0.25, pow(dist_from_centre, 1.4));
  vec3 inner = vec3(1.0);
  vec3 outer = vec3(0.55, 0.92, 1.0);
  vec3 col = mix(inner, outer, dist_from_centre);
  // Beat lifts everything slightly
  col += vec3(0.15, 0.25, 0.35) * u_pulse * (0.4 + 0.6 * dist_from_centre);
  fragColor = vec4(col, alpha);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw new Error('shader compile failed');
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.bindAttribLocation(prog, 0, 'a_pos');
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
  throw new Error('link failed');
}

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const vboPos = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vboPos);
gl.bufferData(gl.ARRAY_BUFFER, VERTS, gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
const ibo = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, EDGES, gl.STATIC_DRAW);

const u_time   = gl.getUniformLocation(prog, 'u_time');
const u_pulse  = gl.getUniformLocation(prog, 'u_pulse');
const u_aspect = gl.getUniformLocation(prog, 'u_aspect');
const u_bands  = gl.getUniformLocation(prog, 'u_bands[0]');
const u_growth = gl.getUniformLocation(prog, 'u_growth');
const u_swirl  = gl.getUniformLocation(prog, 'u_swirl');
const u_bass_swell = gl.getUniformLocation(prog, 'u_bass_swell');
const u_jitter = gl.getUniformLocation(prog, 'u_jitter');
const u_fade   = gl.getUniformLocation(prog, 'u_fade');
const u_total  = gl.getUniformLocation(prog, 'u_total');

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
  }
}
window.addEventListener('resize', resize);
resize();

let pulse = 0;
function triggerBeat() { pulse = 1.0; }
window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); triggerBeat(); }});
window.addEventListener('mousedown', () => triggerBeat());
window.addEventListener('touchstart', () => triggerBeat(), {passive:true});

const hint = document.getElementById('hint');
setTimeout(() => hint.classList.add('gone'), 3000);

const start = performance.now();
let prev = start;
let nextAutoBeat = 0;
const BPM = 124;
const beatInterval = 60.0 / BPM;

function frame(now) {
  const t = (now - start) * 0.001;
  const dt = (now - prev) * 0.001;
  prev = now;

  if (t >= nextAutoBeat) {
    triggerBeat();
    nextAutoBeat = (nextAutoBeat === 0 ? t : nextAutoBeat) + beatInterval;
    if (nextAutoBeat < t) nextAutoBeat = t + beatInterval;
  }
  pulse *= Math.pow(Math.pow(0.92, 60), dt);

  const bands = new Float32Array(8);
  for (let i=0;i<8;i++){
    let v = 0.5 + 0.5*Math.sin(t*(i+1)*0.9 + i*1.3);
    v *= 0.5 + 0.7*Math.max(0, Math.sin(t*2.0 + i*0.5));
    v += pulse * 0.4 * (0.6 + 0.4*Math.sin(i*1.1));
    bands[i] = Math.max(0, Math.min(1, v));
  }

  resize();
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

  gl.useProgram(prog);
  gl.uniform1f(u_time, t);
  gl.uniform1f(u_pulse, pulse);
  gl.uniform1f(u_aspect, canvas.width / canvas.height);
  gl.uniform1fv(u_bands, bands);
  gl.uniform1f(u_growth, GROWTH);
  gl.uniform1f(u_swirl, 0.45);
  gl.uniform1f(u_bass_swell, 0.18);
  gl.uniform1f(u_jitter, 0.005);
  gl.uniform1f(u_fade, 0.55);
  gl.uniform1i(u_total, COPIES);

  gl.bindVertexArray(vao);
  gl.drawElementsInstanced(gl.LINES, EDGE_COUNT * 2, gl.UNSIGNED_SHORT, 0, COPIES);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
