<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>strange_attractor — vgalizer preview</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: ui-monospace, Menlo, monospace; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #hint {
    position: fixed; left: 14px; bottom: 12px;
    color: rgba(220,240,255,0.78);
    font-size: 12px; letter-spacing: 0.04em;
    text-shadow: 0 0 8px rgba(0, 200, 255, 0.4);
    pointer-events: none;
    transition: opacity 1.2s ease;
  }
  #fallback { color: #fff; font-family: monospace; padding: 20px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">strange_attractor — click / SPACE = beat</div>
<script>
"use strict";

const canvas = document.getElementById("c");
const gl = canvas.getContext("webgl2", { antialias: false, premultipliedAlpha: false, alpha: false });
if (!gl) {
  const msg = document.createElement("div");
  msg.id = "fallback";
  msg.textContent = "WebGL2 not available in this browser.";
  document.body.appendChild(msg);
  throw new Error("no webgl2");
}

// ---------- shaders ----------
const VS = `#version 300 es
precision highp float;

uniform float u_time;
uniform float u_level;
uniform float u_pulse;
uniform float u_beat;
uniform vec4  u_params;   // a, b, c, d
uniform float u_rot;
uniform float u_aspect;
uniform int   u_iters;
uniform int   u_count;

out vec3 v_color;

// Clifford attractor
vec2 clifford(vec2 p, vec4 P) {
  return vec2(
    sin(P.x * p.y) + P.z * cos(P.x * p.x),
    sin(P.y * p.x) + P.w * cos(P.y * p.y)
  );
}

float hash(float n) { return fract(sin(n) * 43758.5453123); }

void main() {
  int id = gl_VertexID;
  int side = int(ceil(sqrt(float(u_count))));
  float fx = float(id % side);
  float fy = float(id / side);
  vec2 seed = (vec2(fx, fy) / float(side)) * 2.0 - 1.0;
  seed += vec2(hash(float(id) * 0.137) - 0.5,
               hash(float(id) * 0.913 + 7.0) - 0.5) * 0.6;

  vec2 p = seed * 1.4;
  for (int i = 0; i < 64; i++) {
    if (i >= u_iters) break;
    p = clifford(p, u_params);
  }

  float scale = 1.0 / (1.0 + max(abs(u_params.z), abs(u_params.w)) + 0.4);

  float ca = cos(u_rot), sa = sin(u_rot);
  vec2 q = mat2(ca, -sa, sa, ca) * (p * scale);

  if (u_aspect > 1.0) q.x /= u_aspect; else q.y *= u_aspect;
  q *= 0.92 + 0.06 * u_pulse;

  gl_Position = vec4(q, 0.0, 1.0);
  gl_PointSize = 1.0 + u_level * 0.6 + u_beat * 0.5;

  float t = fract(float(id) * 0.000173 + u_time * 0.02);
  vec3 cyan    = vec3(0.55, 0.95, 1.10);
  vec3 white   = vec3(1.00, 1.00, 1.00);
  vec3 magenta = vec3(1.10, 0.45, 0.95);
  vec3 col;
  if (t < 0.5) col = mix(cyan, white, t * 2.0);
  else         col = mix(white, magenta, (t - 0.5) * 2.0);

  v_color = col * (0.045 + 0.035 * u_level + 0.05 * u_beat);
}
`;

const FS = `#version 300 es
precision highp float;
in vec3 v_color;
out vec4 fragColor;
void main() {
  vec2 d = gl_PointCoord - 0.5;
  float a = smoothstep(0.5, 0.0, length(d));
  fragColor = vec4(v_color * a, 1.0);
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw new Error("shader compile error");
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
  throw new Error("link error");
}
gl.useProgram(prog);

const u_time   = gl.getUniformLocation(prog, "u_time");
const u_level  = gl.getUniformLocation(prog, "u_level");
const u_pulse  = gl.getUniformLocation(prog, "u_pulse");
const u_beat   = gl.getUniformLocation(prog, "u_beat");
const u_params = gl.getUniformLocation(prog, "u_params");
const u_rot    = gl.getUniformLocation(prog, "u_rot");
const u_aspect = gl.getUniformLocation(prog, "u_aspect");
const u_iters  = gl.getUniformLocation(prog, "u_iters");
const u_count  = gl.getUniformLocation(prog, "u_count");

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);

const POINT_COUNT = 80000;

let baseParams = [-1.7, 1.8, -0.9, -0.4];
let targetParams = baseParams.slice();
let currentParams = baseParams.slice();
let rot = 0.0;
let rotTarget = 0.0;

let beatEnv = 0.0;
let pulseEnv = 0.0;

function reseed(strong) {
  const j = strong ? 0.9 : 0.35;
  for (let i = 0; i < 4; i++) {
    targetParams[i] = baseParams[i] + (Math.random() * 2 - 1) * j;
    if (targetParams[i] >  2.0) targetParams[i] =  2.0;
    if (targetParams[i] < -2.0) targetParams[i] = -2.0;
  }
  rotTarget += (Math.random() * 2 - 1) * 0.35;
}

function simAudio(t) {
  const bpm = 125.0;
  const beatHz = bpm / 60.0;
  const phase = (t * beatHz) % 1.0;
  const beatPulse = Math.exp(-phase * 6.0);

  let level = 0.45
    + 0.25 * Math.sin(t * 0.31)
    + 0.20 * Math.sin(t * 1.13 + 1.7)
    + 0.10 * beatPulse;
  const lvl = Math.max(0, Math.min(1, level));

  const bands = new Float32Array(8);
  for (let i = 0; i < 8; i++) {
    const f = 0.4 + i * 0.7;
    let v = 0.5 + 0.5 * Math.sin(t * f + i * 1.3);
    v = v * (0.6 + 0.6 * lvl);
    bands[i] = Math.max(0, Math.min(1, v));
  }
  return { level: lvl, beatPulse, bands, phase };
}

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
  }
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener("resize", resize);
resize();

function triggerBeat() {
  beatEnv = 1.0;
  pulseEnv = 1.0;
  reseed(false);
}
canvas.addEventListener("pointerdown", triggerBeat);
window.addEventListener("keydown", (e) => {
  if (e.code === "Space") { e.preventDefault(); triggerBeat(); }
});

const hint = document.getElementById("hint");
setTimeout(() => { hint.style.opacity = "0"; }, 3000);

gl.disable(gl.DEPTH_TEST);
gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

const t0 = performance.now();
let prevT = t0;
let autoBeatAccum = 0;

function frame(now) {
  const t = (now - t0) / 1000;
  const dt = Math.min(0.05, (now - prevT) / 1000);
  prevT = now;

  const sim = simAudio(t);

  autoBeatAccum += dt;
  if (autoBeatAccum > 60.0 / 125.0) {
    autoBeatAccum = 0;
    beatEnv = Math.max(beatEnv, 0.8);
    pulseEnv = Math.max(pulseEnv, 0.8);
    if (Math.random() < 0.35) reseed(false);
  }

  beatEnv  *= Math.exp(-dt * 5.5);
  pulseEnv *= Math.exp(-dt * 3.0);

  for (let i = 0; i < 4; i++) {
    targetParams[i] += Math.sin(t * (0.07 + i * 0.013) + i) * dt * 0.04;
    if (targetParams[i] >  2.0) targetParams[i] =  2.0;
    if (targetParams[i] < -2.0) targetParams[i] = -2.0;
    currentParams[i] += (targetParams[i] - currentParams[i]) * Math.min(1, dt * 1.6);
  }

  const bass = (sim.bands[0] + sim.bands[1]) * 0.5;
  const cMod = currentParams[2] + (bass - 0.5) * 0.6;

  rot += (rotTarget - rot) * Math.min(1, dt * 2.5);
  rot += dt * 0.03;

  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.useProgram(prog);
  gl.bindVertexArray(vao);

  gl.uniform1f(u_time, t);
  gl.uniform1f(u_level, sim.level);
  gl.uniform1f(u_pulse, pulseEnv);
  gl.uniform1f(u_beat, beatEnv);
  gl.uniform4f(u_params, currentParams[0], currentParams[1], cMod, currentParams[3]);
  gl.uniform1f(u_rot, rot);
  gl.uniform1f(u_aspect, canvas.width / canvas.height);
  const iters = 28 + (Math.floor(t * 30) % 12);
  gl.uniform1i(u_iters, iters);
  gl.uniform1i(u_count, POINT_COUNT);

  gl.drawArrays(gl.POINTS, 0, POINT_COUNT);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
