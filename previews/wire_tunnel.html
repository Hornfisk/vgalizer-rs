<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>wire_tunnel</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; font-family: ui-monospace, Menlo, monospace; color:#9ad; }
  canvas { display:block; width:100vw; height:100vh; }
  #hint {
    position: fixed; left: 12px; bottom: 10px;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    opacity: 0.85; transition: opacity 1.2s ease;
    text-shadow: 0 0 6px #000;
    pointer-events: none;
  }
  #hint.gone { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">wire_tunnel &middot; click / space = beat</div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias:false, alpha:false, premultipliedAlpha:false });
if (!gl) {
  const err = document.createElement('p');
  err.style.cssText = 'color:#f55;padding:1em';
  err.textContent = 'WebGL2 not available.';
  document.body.appendChild(err);
  throw new Error('no webgl2');
}

const VS = `#version 300 es
in vec2 a_pos;
void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }`;

const FS = `#version 300 es
precision highp float;
out vec4 fragColor;

uniform vec2  u_res;
uniform float u_time;
uniform float u_level;
uniform float u_beat;
uniform float u_pulse;
uniform float u_bands[8];

#define PI 3.14159265359
#define TAU 6.28318530718

const float SIDES = 6.0;

float polyRadius(float a, float deform) {
  float seg = TAU / SIDES;
  float k = floor((a + 0.5*seg) / seg);
  float ac = a - k*seg;
  float r = 1.0 / cos(ac);
  float star = 0.5 + 0.5 * cos(SIDES * a);
  r *= mix(1.0, mix(0.55, 1.15, star), deform);
  return r;
}

void main(){
  vec2 res = u_res;
  vec2 uv = (gl_FragCoord.xy - 0.5*res) / min(res.x, res.y);

  float roll = 0.18 * sin(u_time * 0.25);
  float cs = cos(roll), sn = sin(roll);
  uv = mat2(cs,-sn,sn,cs) * uv;

  float bass = (u_bands[0] + u_bands[1]) * 0.5;
  uv.x += 0.18 * sin(u_time * 0.6) * bass;
  uv.y += 0.10 * sin(u_time * 0.43 + 1.3) * bass;

  float r = length(uv);
  float a = atan(uv.y, uv.x);
  float z = 0.35 / max(r, 1e-4);

  float speed = 0.8 + 1.6 * u_level + 0.9 * u_pulse;
  float zMove = z + u_time * speed;

  float deform = u_pulse * 0.85;
  float pr = polyRadius(a, deform);

  // Rings
  float ringSpacing = 1.0;
  float ringFrac = fract(zMove / ringSpacing);
  float ringDist = min(ringFrac, 1.0 - ringFrac);
  float zdpx = fwidth(zMove) + 1e-5;
  float ringPix = ringDist / zdpx;
  float ringLine = 1.0 - smoothstep(0.6, 1.6, ringPix);
  float ringIdx = floor(zMove / ringSpacing);

  // Longitudinal polygon edges
  float seg = TAU / SIDES;
  float k = floor((a + 0.5*seg) / seg);
  float ac = a - k*seg;
  float edgeMetric = abs(ac);
  float edgeAA = fwidth(a) * 1.5 + 1e-4;
  float edgeLine = 1.0 - smoothstep(edgeAA*0.6, edgeAA*1.8, edgeMetric);

  // soft polygon shape weighting on rings
  float polyProfile = smoothstep(0.0, 0.35, 1.0 - abs(1.0 - pr*0.92));
  ringLine *= mix(0.55, 1.0, polyProfile);

  // Atmospheric perspective
  float depthFade = smoothstep(0.0, 0.55, r);
  float nearFade = 1.0 - smoothstep(0.9, 1.6, r);
  float fade = depthFade * nearFade;

  vec3 white  = vec3(1.0);
  vec3 accent = vec3(0.25, 0.95, 1.0);

  float alt = mod(ringIdx, 2.0);
  vec3 ringColor = mix(white, accent, alt);
  vec3 edgeColor = accent;

  vec3 col = vec3(0.0);
  col += ringColor * ringLine * fade * 1.15;
  col += edgeColor * edgeLine * fade * 0.95;

  // beat brighten on near rings
  col += white * ringLine * u_pulse * 0.6 * smoothstep(0.25, 0.9, r);

  // tiny center vignette so vanishing point reads as black
  col *= smoothstep(0.0, 0.06, r);

  col = pow(col, vec3(0.92));
  fragColor = vec4(col, 1.0);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw new Error('shader compile failed');
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.bindAttribLocation(prog, 0, 'a_pos');
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
  throw new Error('link failed');
}

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

const u_res    = gl.getUniformLocation(prog, 'u_res');
const u_time   = gl.getUniformLocation(prog, 'u_time');
const u_level  = gl.getUniformLocation(prog, 'u_level');
const u_beat   = gl.getUniformLocation(prog, 'u_beat');
const u_pulse  = gl.getUniformLocation(prog, 'u_pulse');
const u_bands  = gl.getUniformLocation(prog, 'u_bands[0]');

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
  }
}
window.addEventListener('resize', resize);
resize();

let pulse = 0;
let lastBeatT = 0;
function triggerBeat(t) {
  pulse = 1.0;
  lastBeatT = t;
}
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); triggerBeat(performance.now()*0.001); }
});
window.addEventListener('mousedown', () => triggerBeat(performance.now()*0.001));
window.addEventListener('touchstart', () => triggerBeat(performance.now()*0.001), {passive:true});

const hint = document.getElementById('hint');
setTimeout(() => hint.classList.add('gone'), 3000);

const start = performance.now();
let prev = start;
let nextAutoBeat = 0;
const BPM = 120;
const beatInterval = 60.0 / BPM;

function frame(now) {
  const t = (now - start) * 0.001;
  const dt = (now - prev) * 0.001;
  prev = now;

  let level = 0.5 + 0.4*Math.sin(t*0.7) + 0.1*Math.sin(t*3.1);
  level = Math.max(0, Math.min(1, level));

  if (t >= nextAutoBeat) {
    triggerBeat(t);
    nextAutoBeat = (nextAutoBeat === 0 ? t : nextAutoBeat) + beatInterval;
    if (nextAutoBeat < t) nextAutoBeat = t + beatInterval;
  }
  // decay 0.92 per ~16.67ms frame, frame-rate independent
  const decayPerSec = Math.pow(0.92, 60);
  pulse *= Math.pow(decayPerSec, dt);

  const bands = new Float32Array(8);
  for (let i=0;i<8;i++){
    let v = 0.5 + 0.5*Math.sin(t*(i+1)*0.9 + i);
    bands[i] = Math.max(0, Math.min(1, v));
  }

  resize();
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.useProgram(prog);
  gl.uniform2f(u_res, canvas.width, canvas.height);
  gl.uniform1f(u_time, t);
  gl.uniform1f(u_level, level);
  gl.uniform1f(u_beat, (t - lastBeatT) < 0.02 ? 1.0 : 0.0);
  gl.uniform1f(u_pulse, pulse);
  gl.uniform1fv(u_bands, bands);

  gl.bindVertexArray(vao);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
