<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>kaleido_warp</title>
<!--
  kaleido_warp · N-fold rotational kaleidoscope. The screen is folded into N
  identical wedges around the centre, each wedge a slice of a thin-line seed
  pattern (rings + radial spokes + diagonal traces) that breathes with the
  audio. N changes on bass swells, the whole stack slowly rotates, beats
  briefly bloom the centre. Distinct from the existing `kaleido` effect:
  this one is pure thin-line geometry on black, no image source needed.

  Planned in-engine params (param 0..5):
    0  segments      4..16        8     base number of mirror wedges
    1  rot_speed    -1.0..1.0    0.20  global rotation speed
    2  warp_amount   0.0..1.5    0.55  swirl warp strength
    3  ring_count    2..8         5    number of seed rings
    4  spoke_count   3..16        7    seed spokes per ring
    5  hue_shift     0.0..1.0    0.55  cyan / magenta / lime lean
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; font-family: ui-monospace, Menlo, monospace; color:#9ad; }
  canvas { display:block; width:100vw; height:100vh; }
  #hint {
    position: fixed; left: 12px; bottom: 10px;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    opacity: 0.85; transition: opacity 1.2s ease;
    text-shadow: 0 0 6px #000;
    pointer-events: none;
  }
  #hint.gone { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">kaleido_warp &middot; click / space = beat</div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias:false, alpha:false, premultipliedAlpha:false });
if (!gl) { document.body.textContent = 'WebGL2 not available.'; throw new Error('no webgl2'); }

const VS = `#version 300 es
in vec2 a_pos;
void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }`;

const FS = `#version 300 es
precision highp float;
out vec4 fragColor;

uniform vec2  u_res;
uniform float u_time;
uniform float u_level;
uniform float u_pulse;
uniform float u_segs;     // float so it can change smoothly on bass
uniform float u_bands[8];

#define PI  3.14159265359
#define TAU 6.28318530718

// Thin-line seed pattern: a few rings, a few radial spokes, audio-driven.
// Returns intensity in [0, ~1].
float seed(vec2 p) {
  float r   = length(p);
  float ang = atan(p.y, p.x);
  float aa  = 1.5 / u_res.y;

  float v = 0.0;

  // Rings — radii driven by bands
  for (int i = 0; i < 5; ++i) {
    float fi = float(i);
    float r0 = 0.12 + fi * 0.16 + 0.05 * sin(u_time * 0.8 + fi);
    r0 += 0.06 * u_bands[i];
    float d = abs(r - r0);
    v += (1.0 - smoothstep(0.001, 0.004 + aa, d)) * (0.55 + 0.45 * u_bands[i]);
  }

  // Radial spokes
  float spokes = 7.0;
  float a2 = mod(ang + u_time * 0.15, TAU / spokes);
  a2 = abs(a2 - (TAU / spokes) * 0.5);
  float spokeD = a2 * r;
  v += (1.0 - smoothstep(0.002, 0.006 + aa, spokeD)) * (0.5 + 0.5 * u_bands[3]);

  // Drifting diagonal trace
  float diag = abs(p.y - sin(p.x * 6.0 + u_time * 1.3) * 0.18);
  v += (1.0 - smoothstep(0.002, 0.006 + aa, diag)) * 0.6 * (0.5 + u_bands[5]);

  // Centre dot
  v += exp(-r * r * 600.0) * 0.7;

  return v;
}

void main(){
  vec2 res = u_res;
  vec2 p = (gl_FragCoord.xy - 0.5 * res) / min(res.x, res.y);

  // Global slow rotation
  float rot = u_time * 0.20 + u_pulse * 0.4;
  float c = cos(rot), s = sin(rot);
  p = mat2(c, -s, s, c) * p;

  // Convert to polar then fold the angle into a single wedge
  float r   = length(p);
  float ang = atan(p.y, p.x);

  float segs = u_segs;
  float wedge = TAU / segs;
  float a = mod(ang + PI, wedge);
  // Mirror within the wedge so seams blend
  a = abs(a - wedge * 0.5);

  // Swirl warp: rotate radius-dependent
  float warp = 0.55 * sin(r * 6.0 - u_time * 1.4) * (0.5 + u_bands[2]);
  a += warp * 0.15;

  // Convert wedge coords back to cartesian for the seed lookup
  vec2 fp = vec2(cos(a) * r, sin(a) * r);

  float v = seed(fp);

  // Slight chromatic wedge tint based on hue_shift idea
  vec3 cA = vec3(0.20, 0.95, 1.00);  // cyan
  vec3 cB = vec3(1.00, 0.30, 0.85);  // magenta
  vec3 cC = vec3(0.40, 1.00, 0.30);  // lime
  float ph = fract(u_time * 0.07);
  vec3 tint = mix(mix(cA, cB, ph), cC, 0.5 - 0.5 * cos(ph * TAU));

  vec3 col = vec3(v) * tint;
  // White core
  col += vec3(v * v) * 0.6;

  // Beat bloom in centre
  col += tint * exp(-r * 4.0) * u_pulse * 0.6;

  // Vignette
  col *= smoothstep(1.1, 0.2, length(p));

  col = 1.0 - exp(-col * 1.4);
  col = pow(col, vec3(0.92));
  fragColor = vec4(col, 1.0);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw new Error('shader compile failed');
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.bindAttribLocation(prog, 0, 'a_pos');
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
  throw new Error('link failed');
}

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

const u_res    = gl.getUniformLocation(prog, 'u_res');
const u_time   = gl.getUniformLocation(prog, 'u_time');
const u_level  = gl.getUniformLocation(prog, 'u_level');
const u_pulse  = gl.getUniformLocation(prog, 'u_pulse');
const u_segs   = gl.getUniformLocation(prog, 'u_segs');
const u_bands  = gl.getUniformLocation(prog, 'u_bands[0]');

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
  }
}
window.addEventListener('resize', resize);
resize();

let pulse = 0;
let lastBeatT = 0;
function triggerBeat(t) { pulse = 1.0; lastBeatT = t; }
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); triggerBeat(performance.now()*0.001); }
});
window.addEventListener('mousedown', () => triggerBeat(performance.now()*0.001));
window.addEventListener('touchstart', () => triggerBeat(performance.now()*0.001), {passive:true});

const hint = document.getElementById('hint');
setTimeout(() => hint.classList.add('gone'), 3000);

const start = performance.now();
let prev = start;
let nextAutoBeat = 0;
const BPM = 124;
const beatInterval = 60.0 / BPM;
let segments = 8.0;
let segTarget = 8.0;

function frame(now) {
  const t = (now - start) * 0.001;
  const dt = (now - prev) * 0.001;
  prev = now;

  let level = 0.5 + 0.4*Math.sin(t*0.7) + 0.1*Math.sin(t*3.1);
  level = Math.max(0, Math.min(1, level));

  if (t >= nextAutoBeat) {
    triggerBeat(t);
    // Occasionally jump to a new symmetry on beat
    if (Math.random() < 0.18) {
      const opts = [4, 5, 6, 7, 8, 10, 12];
      segTarget = opts[Math.floor(Math.random() * opts.length)];
    }
    nextAutoBeat = (nextAutoBeat === 0 ? t : nextAutoBeat) + beatInterval;
    if (nextAutoBeat < t) nextAutoBeat = t + beatInterval;
  }
  // Smooth segs toward target
  segments += (segTarget - segments) * Math.min(1.0, dt * 3.0);

  const decayPerSec = Math.pow(0.92, 60);
  pulse *= Math.pow(decayPerSec, dt);

  const bands = new Float32Array(8);
  for (let i=0;i<8;i++){
    let v = 0.5 + 0.5*Math.sin(t*(i+1)*0.9 + i*1.3);
    v *= 0.5 + 0.7*Math.max(0, Math.sin(t*2.1 + i*0.6));
    v += pulse * 0.4 * (0.6 + 0.4*Math.sin(i*1.1));
    bands[i] = Math.max(0, Math.min(1, v));
  }

  resize();
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.useProgram(prog);
  gl.uniform2f(u_res, canvas.width, canvas.height);
  gl.uniform1f(u_time, t);
  gl.uniform1f(u_level, level);
  gl.uniform1f(u_pulse, pulse);
  gl.uniform1f(u_segs, segments);
  gl.uniform1fv(u_bands, bands);

  gl.bindVertexArray(vao);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
