<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>vector_terrain</title>
<!--
  vector_terrain · Geiss/Milkdrop wireframe waterfall.
  Heights = scrolling FFT spectrum, each row painted as a polyline in
  perspective. Hidden-line front-to-back fill. Red→green per ref image.

  Planned in-engine params (param 0..5):
    0  camera_tilt   0.20..0.80   0.55   horizon Y in screen space
    1  row_count    12..40        24     number of rows in the waterfall
    2  height_scale  0.10..1.50   0.70   peak height of each ridge
    3  scroll_rate   0.10..3.00   1.20   how fast new spectrum frames push back
    4  envelope      0.00..0.40   0.12   centre falloff (0=flat strip, .4=mountain)
    5  hue_bias      0.00..1.00   0.50   shift red→green gradient up/down
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; font-family: ui-monospace, Menlo, monospace; color:#9ad; }
  canvas { display:block; width:100vw; height:100vh; }
  #hint {
    position: fixed; left: 12px; bottom: 10px;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    opacity: 0.85; transition: opacity 1.2s ease;
    text-shadow: 0 0 6px #000;
    pointer-events: none;
  }
  #hint.gone { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">vector_terrain &middot; click / space = beat</div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias:false, alpha:false, premultipliedAlpha:false });
if (!gl) {
  const err = document.createElement('p');
  err.style.cssText = 'color:#f55;padding:1em';
  err.textContent = 'WebGL2 not available.';
  document.body.appendChild(err);
  throw new Error('no webgl2');
}

const VS = `#version 300 es
in vec2 a_pos;
void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }`;

const FS = `#version 300 es
precision highp float;
out vec4 fragColor;

uniform vec2  u_res;
uniform float u_time;
uniform float u_level;
uniform float u_beat;
uniform float u_pulse;
uniform float u_bands[8];
uniform float u_history[288]; // ROWS * 8 bands

#define ROWS 36

float sampleBand(int row, float colF) {
  // Reconstruct height at column position colF for the given row.
  // colF in roughly [-4, 4] world units; map to band index 0..7.
  float h = 0.0;
  for (int b = 0; b < 8; ++b) {
    float pos = (float(b) - 3.5) * 0.95;
    float dx = colF - pos;
    int idx = row * 8 + b;
    h += u_history[idx] * exp(-dx*dx*0.45);
  }
  return h;
}

void main(){
  vec2 p = gl_FragCoord.xy / u_res;     // 0..1, origin bottom-left
  float aspect = u_res.x / u_res.y;

  // Sky / background
  float horizon = 0.62;
  if (p.y > horizon + 0.001) {
    fragColor = vec4(0.0, 0.0, 0.0, 1.0);
    return;
  }

  // Iterate from far → near, painter's algorithm with a "highest line so far"
  // tracker so distant ridges hide behind closer mountain silhouettes.
  vec3 col = vec3(0.0);
  float skyMin = horizon; // smallest y reached by any closer row's silhouette so far

  // Loop near→far so that closer ridges are drawn last (they win the pixel).
  for (int i = 0; i < ROWS; ++i) {
    float zRow = 0.7 + float(i) * 0.36;
    float wxScale = zRow * 0.85 * aspect * 0.5;
    float worldX = (p.x - 0.5) * 2.0 * wxScale;

    float h = sampleBand(i, worldX);
    // tilted secondary ridges along worldX/i so each row has its own profile
    h += 0.18 * sin(worldX * 3.5 + float(i) * 0.7 - u_time * 2.3);
    h += 0.10 * sin(worldX * 7.0 - float(i) * 0.4 + u_time * 3.1);
    // central envelope so middle is tallest
    h *= exp(-worldX*worldX * 0.085);
    // travelling-wave wobble (more amplitude, faster)
    h *= 0.65 + 0.55 * sin(float(i) * 0.45 - u_time * 2.6);
    // beat punch (stronger)
    h *= 0.55 + 0.95 * (u_pulse * 0.7 + 0.3);
    h = max(h, 0.0);

    // Project ground+height to screen y
    // Camera at eye height ~0.5, looking forward; floor row at depth zRow
    // projects to y = horizon - 0.5/zRow (ground), shifted up by h * 0.85/zRow.
    float yLine = horizon - (0.5 + h * 1.05) / zRow;

    if (yLine < 0.0) continue;

    // Distance from current pixel to this row line
    float d = abs(p.y - yLine);
    float aa = 1.4 / u_res.y;
    float w = 1.0 - smoothstep(aa * 0.5, aa * 2.5, d);
    if (w < 0.001) continue;

    // Hidden-line: only draw the part of this row that pokes ABOVE everything closer.
    // skyMin is the lowest yLine seen for nearer rows (smaller zRow). If a far row's
    // yLine is below skyMin (= it's drawn lower on screen than everything nearer),
    // it's behind. Skip.
    // Since we go near→far, near rows update skyMin first.
    if (yLine > skyMin - 0.0005) continue;

    // Colour: red at low h, green at high h, with a faint white core
    float hN = clamp(h * 1.6, 0.0, 1.0);
    vec3 c = mix(vec3(1.00, 0.18, 0.06), vec3(0.18, 1.00, 0.30), hN);
    c += vec3(0.6, 0.7, 0.6) * pow(hN, 3.0) * 0.5;  // green-white tip

    // depth fade
    float fade = 1.0 - smoothstep(2.0, 14.0, zRow);
    col = max(col, c * w * fade);

    // Update silhouette envelope
    skyMin = min(skyMin, yLine);
  }

  // Beat global brighten
  col *= 1.0 + u_pulse * 0.25;

  // Gentle gamma
  col = pow(col, vec3(0.92));
  fragColor = vec4(col, 1.0);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw new Error('shader compile failed');
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.bindAttribLocation(prog, 0, 'a_pos');
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
  throw new Error('link failed');
}

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

const u_res     = gl.getUniformLocation(prog, 'u_res');
const u_time    = gl.getUniformLocation(prog, 'u_time');
const u_level   = gl.getUniformLocation(prog, 'u_level');
const u_beat    = gl.getUniformLocation(prog, 'u_beat');
const u_pulse   = gl.getUniformLocation(prog, 'u_pulse');
const u_bands   = gl.getUniformLocation(prog, 'u_bands[0]');
const u_history = gl.getUniformLocation(prog, 'u_history[0]');

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
  }
}
window.addEventListener('resize', resize);
resize();

let pulse = 0;
let lastBeatT = 0;
function triggerBeat(t) {
  pulse = 1.0;
  lastBeatT = t;
}
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); triggerBeat(performance.now()*0.001); }
});
window.addEventListener('mousedown', () => triggerBeat(performance.now()*0.001));
window.addEventListener('touchstart', () => triggerBeat(performance.now()*0.001), {passive:true});

const hint = document.getElementById('hint');
setTimeout(() => hint.classList.add('gone'), 3000);

// History ring buffer: 36 rows × 8 bands.
// Newest row is index 0; oldest at index ROWS-1.
const ROWS = 36;
const history = new Float32Array(ROWS * 8);

const start = performance.now();
let prev = start;
let nextAutoBeat = 0;
const BPM = 124;
const beatInterval = 60.0 / BPM;
let scrollAccum = 0.0;

function frame(now) {
  const t = (now - start) * 0.001;
  const dt = (now - prev) * 0.001;
  prev = now;

  let level = 0.5 + 0.4*Math.sin(t*0.7) + 0.1*Math.sin(t*3.1);
  level = Math.max(0, Math.min(1, level));

  if (t >= nextAutoBeat) {
    triggerBeat(t);
    nextAutoBeat = (nextAutoBeat === 0 ? t : nextAutoBeat) + beatInterval;
    if (nextAutoBeat < t) nextAutoBeat = t + beatInterval;
  }
  const decayPerSec = Math.pow(0.92, 60);
  pulse *= Math.pow(decayPerSec, dt);

  const bands = new Float32Array(8);
  for (let i=0;i<8;i++){
    let v = 0.55 + 0.55*Math.sin(t*(i+1)*1.1 + i*1.3);
    v *= 0.5 + 0.85*Math.max(0, Math.sin(t*2.3 + i*0.5));
    // beat injection so peaks line up with the auto-beats
    v += pulse * 0.5 * (0.6 + 0.4*Math.sin(i*1.1));
    bands[i] = Math.max(0, Math.min(1, v));
  }

  // Scroll the history ring at fixed rate
  scrollAccum += dt * 28.0; // rows per second — denser, faster waterfall
  while (scrollAccum >= 1.0) {
    scrollAccum -= 1.0;
    // Shift older
    history.copyWithin(8, 0, (ROWS-1)*8);
    // Newest at index 0
    for (let b=0;b<8;b++) history[b] = bands[b];
  }

  resize();
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.useProgram(prog);
  gl.uniform2f(u_res, canvas.width, canvas.height);
  gl.uniform1f(u_time, t);
  gl.uniform1f(u_level, level);
  gl.uniform1f(u_beat, (t - lastBeatT) < 0.02 ? 1.0 : 0.0);
  gl.uniform1f(u_pulse, pulse);
  gl.uniform1fv(u_bands, bands);
  gl.uniform1fv(u_history, history);

  gl.bindVertexArray(vao);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
