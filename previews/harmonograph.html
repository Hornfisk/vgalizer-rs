<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>harmonograph</title>
<!--
  harmonograph · Twin-pendulum harmonograph trace with phosphor decay.
  x = A1·sin(f1·t+φ1)·exp(-d1·t) + A2·sin(f2·t+φ2)·exp(-d2·t)
  y = A3·sin(f3·t+φ3)·exp(-d3·t) + A4·sin(f4·t+φ4)·exp(-d4·t)
  Frequencies and phases drift continuously; beats re-seed amplitudes.
  Single thin amber trace evolving against deep black.

  Planned in-engine params (param 0..5):
    0  freq_a       1.0..6.0    2.40   pendulum 1 base frequency (X axis)
    1  freq_b       1.0..6.0    3.10   pendulum 2 base frequency (Y axis)
    2  damping      0.0..0.01   0.0015 amplitude decay rate
    3  amp          0.20..0.55  0.42   curve amplitude
    4  trail        0.50..0.99  0.94   phosphor decay (frame trail)
    5  hue          0.0..1.0    0.10   amber → cyan tint
-->
<style>
  html, body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; font-family: ui-monospace, Menlo, monospace; color:#9ad; }
  canvas { display:block; width:100vw; height:100vh; }
  #hint {
    position: fixed; left: 12px; bottom: 10px;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    opacity: 0.85; transition: opacity 1.2s ease;
    text-shadow: 0 0 6px #000;
    pointer-events: none;
  }
  #hint.gone { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">harmonograph &middot; click / space = beat</div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias:false, alpha:false, premultipliedAlpha:false });
if (!gl) { document.body.textContent = 'WebGL2 not available.'; throw new Error('no webgl2'); }

const VS = `#version 300 es
in vec2 a_pos;
out vec2 v_uv;
void main(){ v_uv = a_pos*0.5+0.5; gl_Position = vec4(a_pos, 0.0, 1.0); }`;

// Trace pass: composite previous frame * decay + nearest-curve distance.
const TRACE_FS = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

uniform sampler2D u_prev;
uniform vec2  u_res;
uniform float u_time;
uniform float u_pulse;
uniform float u_level;
uniform float u_decay;
uniform float u_phase;       // slowly drifting phase used by both pendulums
uniform float u_bands[8];

#define N 384
#define TAU 6.28318530718

vec2 curve(float t) {
  // Pendulum 1
  float A1 = 0.42 + 0.10 * u_bands[0];
  float A2 = 0.32 + 0.10 * u_bands[2];
  float f1 = 2.40 + 0.40 * u_bands[1];
  float f2 = 3.10 + 0.50 * u_bands[3];
  float p1 = u_phase * 0.30;
  float p2 = u_phase * 0.50 + 1.0;
  float d1 = 0.0010;
  float d2 = 0.0014;
  float xx = A1 * sin(f1 * t + p1) * exp(-d1 * t)
           + A2 * sin(f2 * t + p2) * exp(-d2 * t);

  // Pendulum 2
  float A3 = 0.40 + 0.09 * u_bands[4];
  float A4 = 0.30 + 0.09 * u_bands[6];
  float f3 = 2.55 + 0.50 * u_bands[5];
  float f4 = 3.85 + 0.45 * u_bands[7];
  float p3 = u_phase * 0.42 + 0.5;
  float p4 = u_phase * 0.36 + 2.0;
  float yy = A3 * sin(f3 * t + p3) * exp(-d1 * t)
           + A4 * sin(f4 * t + p4) * exp(-d2 * t);

  return vec2(xx, yy);
}

void main(){
  vec2 res = u_res;
  float aspect = res.x / res.y;
  vec2 p = (v_uv - 0.5) * 2.0;
  p.x *= aspect;

  // Sample the curve over t = 0..6 and find nearest distance to current pixel
  float minD = 1e9;
  for (int i = 0; i < N; ++i) {
    float t = float(i) / float(N) * 6.0;
    vec2 q = curve(t * 6.2832);
    vec2 diff = p - q;
    float d2 = dot(diff, diff);
    minD = min(minD, d2);
  }
  float d = sqrt(minD);

  float pix = 2.0 / min(res.x, res.y);
  float core = exp(-(d * d) / (pix * pix * 1.4));
  float halo = exp(-(d * d) / 0.0030);

  vec3 amber = vec3(1.00, 0.65, 0.18);
  vec3 newCol = vec3(core) * 1.1 + amber * halo * 0.65;
  newCol += amber * u_pulse * 0.10 * exp(-length(p) * 1.5);

  vec3 prev = texture(u_prev, v_uv).rgb * u_decay;
  vec3 outc = max(prev, newCol);
  outc += newCol * 0.35;

  fragColor = vec4(outc, 1.0);
}`;

const PRESENT_FS = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;
uniform sampler2D u_src;
void main(){
  vec3 c = texture(u_src, v_uv).rgb;
  c = 1.0 - exp(-c * 1.5);
  c = pow(c, vec3(0.92));
  fragColor = vec4(c, 1.0);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw new Error('shader compile failed');
  }
  return s;
}
function makeProg(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fs));
  gl.bindAttribLocation(p, 0, 'a_pos');
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    throw new Error('link failed');
  }
  return p;
}
const traceProg   = makeProg(VS, TRACE_FS);
const presentProg = makeProg(VS, PRESENT_FS);

const ext = gl.getExtension('EXT_color_buffer_float');
if (!ext) console.warn('EXT_color_buffer_float missing');

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

const T_u_prev   = gl.getUniformLocation(traceProg, 'u_prev');
const T_u_res    = gl.getUniformLocation(traceProg, 'u_res');
const T_u_time   = gl.getUniformLocation(traceProg, 'u_time');
const T_u_pulse  = gl.getUniformLocation(traceProg, 'u_pulse');
const T_u_level  = gl.getUniformLocation(traceProg, 'u_level');
const T_u_decay  = gl.getUniformLocation(traceProg, 'u_decay');
const T_u_phase  = gl.getUniformLocation(traceProg, 'u_phase');
const T_u_bands  = gl.getUniformLocation(traceProg, 'u_bands[0]');

const P_u_src    = gl.getUniformLocation(presentProg, 'u_src');

let pingTex = null, pingFbo = null;
let pongTex = null, pongFbo = null;
let fbW = 0, fbH = 0;

function makeFbo(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { tex, fbo };
}
function resizeFbos() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const cap = 720;
  const aspect = window.innerWidth / window.innerHeight;
  let h = Math.min(window.innerHeight * dpr, cap);
  let w = Math.floor(h * aspect);
  h = Math.floor(h);
  if (w === fbW && h === fbH) return;
  fbW = w; fbH = h;
  if (pingTex) { gl.deleteTexture(pingTex); gl.deleteFramebuffer(pingFbo); }
  if (pongTex) { gl.deleteTexture(pongTex); gl.deleteFramebuffer(pongFbo); }
  const a = makeFbo(w, h); pingTex = a.tex; pingFbo = a.fbo;
  const b = makeFbo(w, h); pongTex = b.tex; pongFbo = b.fbo;
  gl.bindFramebuffer(gl.FRAMEBUFFER, pingFbo);
  gl.viewport(0,0,w,h); gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
  gl.bindFramebuffer(gl.FRAMEBUFFER, pongFbo);
  gl.viewport(0,0,w,h); gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}
function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
  }
}
window.addEventListener('resize', () => { resizeCanvas(); resizeFbos(); });
resizeCanvas(); resizeFbos();

let pulse = 0;
let lastBeatT = 0;
function triggerBeat(t) { pulse = 1.0; lastBeatT = t; }
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); triggerBeat(performance.now()*0.001); }
});
window.addEventListener('mousedown', () => triggerBeat(performance.now()*0.001));
window.addEventListener('touchstart', () => triggerBeat(performance.now()*0.001), {passive:true});

const hint = document.getElementById('hint');
setTimeout(() => hint.classList.add('gone'), 3000);

const start = performance.now();
let prev = start;
let nextAutoBeat = 0;
const BPM = 124;
const beatInterval = 60.0 / BPM;
let useFront = true;
let phaseDrift = 0.0;

function frame(now) {
  const t = (now - start) * 0.001;
  const dt = (now - prev) * 0.001;
  prev = now;

  let level = 0.5 + 0.4*Math.sin(t*0.7) + 0.1*Math.sin(t*3.1);
  level = Math.max(0, Math.min(1, level));

  if (t >= nextAutoBeat) {
    triggerBeat(t);
    nextAutoBeat = (nextAutoBeat === 0 ? t : nextAutoBeat) + beatInterval;
    if (nextAutoBeat < t) nextAutoBeat = t + beatInterval;
  }
  const decayPerSec = Math.pow(0.93, 60);
  pulse *= Math.pow(decayPerSec, dt);

  // Slowly drift the phase so the curve evolves; beats give it a small kick
  phaseDrift += dt * (0.6 + level * 0.4 + pulse * 1.5);

  const bands = new Float32Array(8);
  for (let i=0;i<8;i++){
    bands[i] = Math.max(0, Math.min(1, 0.4 + 0.5*Math.sin(t*(i+1)*0.7 + i*1.1)));
  }

  resizeCanvas(); resizeFbos();

  const srcTex = useFront ? pingTex : pongTex;
  const dstFbo = useFront ? pongFbo : pingFbo;
  const dstTex = useFront ? pongTex : pingTex;

  gl.bindFramebuffer(gl.FRAMEBUFFER, dstFbo);
  gl.viewport(0, 0, fbW, fbH);
  gl.useProgram(traceProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, srcTex);
  gl.uniform1i(T_u_prev, 0);
  gl.uniform2f(T_u_res, fbW, fbH);
  gl.uniform1f(T_u_time, t);
  gl.uniform1f(T_u_pulse, pulse);
  gl.uniform1f(T_u_level, level);
  gl.uniform1f(T_u_decay, 0.945);
  gl.uniform1f(T_u_phase, phaseDrift);
  gl.uniform1fv(T_u_bands, bands);
  gl.bindVertexArray(vao);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(presentProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, dstTex);
  gl.uniform1i(P_u_src, 0);
  gl.bindVertexArray(vao);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  useFront = !useFront;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
