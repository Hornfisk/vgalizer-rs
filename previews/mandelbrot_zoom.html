<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>mandelbrot_zoom — vgalizer preview</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;height:100%;width:100%;}
  canvas{display:block;width:100vw;height:100vh;}
  #hint{
    position:fixed;left:12px;bottom:10px;
    font:12px/1.4 ui-monospace,Menlo,Consolas,monospace;
    color:#cfd6ff;letter-spacing:.04em;
    text-shadow:0 0 6px #000,0 0 2px #000;
    pointer-events:none;
    transition:opacity 1s ease;
    opacity:1;
  }
  #hint.fade{opacity:0;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">click / space = beat &middot; BPM 120</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const gl = canvas.getContext('webgl2', {antialias:false, premultipliedAlpha:false});
  if(!gl){
    const p = document.createElement('p');
    p.style.cssText = 'color:#fff;font-family:monospace;padding:20px';
    p.textContent = 'WebGL2 not available';
    document.body.appendChild(p);
    return;
  }

  const VS = `#version 300 es
  in vec2 a_pos;
  out vec2 v_uv;
  void main(){
    v_uv = a_pos * 0.5 + 0.5;
    gl_Position = vec4(a_pos, 0.0, 1.0);
  }`;

  const FS = `#version 300 es
  precision highp float;
  in vec2 v_uv;
  out vec4 outColor;

  uniform vec2  u_res;
  uniform float u_time;
  uniform float u_level;
  uniform float u_beat;
  uniform float u_pulse;
  uniform float u_bands[8];
  uniform vec2  u_center;
  uniform float u_zoom;
  uniform float u_paletteShift;
  uniform float u_maxIter;

  // techno palette: deep blue -> white -> magenta -> black
  vec3 technoPalette(float t){
    t = fract(t);
    vec3 c0 = vec3(0.02, 0.05, 0.25); // deep blue
    vec3 c1 = vec3(0.85, 0.95, 1.00); // white (cool)
    vec3 c2 = vec3(0.95, 0.10, 0.75); // magenta
    vec3 c3 = vec3(0.00, 0.00, 0.00); // black
    float seg = t * 4.0;
    if(seg < 1.0)      return mix(c0, c1, smoothstep(0.0, 1.0, seg));
    else if(seg < 2.0) return mix(c1, c2, smoothstep(0.0, 1.0, seg - 1.0));
    else if(seg < 3.0) return mix(c2, c3, smoothstep(0.0, 1.0, seg - 2.0));
    else               return mix(c3, c0, smoothstep(0.0, 1.0, seg - 3.0));
  }

  void main(){
    vec2 frag = (gl_FragCoord.xy - 0.5*u_res) / min(u_res.x,u_res.y);
    vec2 c = u_center + frag * (3.0 / u_zoom);

    float maxIter = u_maxIter;
    vec2 z = vec2(0.0);
    float iter = 0.0;
    float esc = 0.0;
    for(int i=0;i<2048;i++){
      if(float(i) >= maxIter) break;
      z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;
      float d2 = dot(z,z);
      if(d2 > 256.0){
        float log_zn = 0.5*log(d2);
        float nu = log(log_zn / log(2.0)) / log(2.0);
        iter = float(i) + 1.0 - nu;
        esc = 1.0;
        break;
      }
      iter = float(i)+1.0;
    }

    if(esc < 0.5){
      // inside set: pure black
      outColor = vec4(0.0,0.0,0.0,1.0);
      return;
    }

    float t = iter / maxIter;
    float p = t * 4.0 + u_time * 0.2 + u_paletteShift;
    vec3 col = technoPalette(p);

    col *= 0.85 + 0.35 * u_level + 0.25 * u_pulse;

    float bandMix = 0.0;
    for(int i=0;i<8;i++) bandMix += u_bands[i];
    bandMix /= 8.0;
    col += vec3(0.0, 0.05, 0.10) * bandMix;

    vec2 q = (gl_FragCoord.xy / u_res) - 0.5;
    float vig = smoothstep(0.85, 0.2, length(q));
    col *= mix(0.6, 1.0, vig);

    outColor = vec4(col, 1.0);
  }`;

  function compile(type, src){
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
      console.error(gl.getShaderInfoLog(s));
      console.error(src);
    }
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
  gl.bindAttribLocation(prog, 0, 'a_pos');
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog, gl.LINK_STATUS)){
    console.error(gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  const vao = gl.createVertexArray();
  gl.bindVertexArray(vao);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

  const uRes        = gl.getUniformLocation(prog, 'u_res');
  const uTime       = gl.getUniformLocation(prog, 'u_time');
  const uLevel      = gl.getUniformLocation(prog, 'u_level');
  const uBeat       = gl.getUniformLocation(prog, 'u_beat');
  const uPulse      = gl.getUniformLocation(prog, 'u_pulse');
  const uBands      = gl.getUniformLocation(prog, 'u_bands[0]');
  const uCenter     = gl.getUniformLocation(prog, 'u_center');
  const uZoom       = gl.getUniformLocation(prog, 'u_zoom');
  const uPalShift   = gl.getUniformLocation(prog, 'u_paletteShift');
  const uMaxIter    = gl.getUniformLocation(prog, 'u_maxIter');

  function resize(){
    const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    const w = Math.floor(window.innerWidth  * dpr);
    const h = Math.floor(window.innerHeight * dpr);
    if(canvas.width !== w || canvas.height !== h){
      canvas.width = w; canvas.height = h;
      gl.viewport(0,0,w,h);
    }
  }
  window.addEventListener('resize', resize);
  resize();

  // deep zoom targets
  const TARGETS = [
    [-0.74529,  0.11307],
    [-0.748,    0.1],
    [-1.25066,  0.02012],
    [-0.7436438870371587, 0.13182590420531198],
  ];
  let targetIdx = 0;
  let cycleStart = 0;
  const CYCLE = 30.0;

  let pulse = 0.0;
  let lastBeatIdx = -1;
  let paletteShift = 0.0;

  const hint = document.getElementById('hint');
  setTimeout(()=>hint.classList.add('fade'), 3000);

  function kick(){
    pulse = 1.0;
    paletteShift += 0.07;
  }
  window.addEventListener('mousedown', kick);
  window.addEventListener('keydown', e => { if(e.code === 'Space'){ e.preventDefault(); kick(); }});

  const start = performance.now();
  function frame(now){
    const t = (now - start) * 0.001;

    if(t - cycleStart > CYCLE){
      cycleStart = t;
      targetIdx = (targetIdx + 1) % TARGETS.length;
    }
    const localT = t - cycleStart;

    const level = Math.max(0, Math.min(1, 0.5 + 0.4*Math.sin(t*0.7) + 0.1*Math.sin(t*3.1)));

    const beatPeriod = 0.5; // 120 BPM
    const beatPhase = t / beatPeriod;
    const beatIdx = Math.floor(beatPhase);
    if(beatIdx !== lastBeatIdx){
      lastBeatIdx = beatIdx;
      pulse = Math.max(pulse, 1.0);
      paletteShift += 0.015;
    }
    const beat = (beatPhase - beatIdx) < 0.05 ? 1.0 : 0.0;
    pulse *= 0.92;

    const bands = new Float32Array(8);
    for(let i=0;i<8;i++){
      bands[i] = Math.max(0, Math.min(1, 0.5 + 0.5*Math.sin(t*(i+1)*0.9 + i)));
    }

    const bass = (bands[0] + bands[1]) * 0.5;
    const zoom = Math.exp(localT * (0.15 + 0.05*bass));

    const maxIter = Math.min(1024, Math.floor(220 + 60 * Math.log2(1 + zoom)));

    const tgt = TARGETS[targetIdx];

    gl.useProgram(prog);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, t);
    gl.uniform1f(uLevel, level);
    gl.uniform1f(uBeat, beat);
    gl.uniform1f(uPulse, pulse);
    gl.uniform1fv(uBands, bands);
    gl.uniform2f(uCenter, tgt[0], tgt[1]);
    gl.uniform1f(uZoom, zoom);
    gl.uniform1f(uPalShift, paletteShift);
    gl.uniform1f(uMaxIter, maxIter);

    gl.bindVertexArray(vao);
    gl.drawArrays(gl.TRIANGLES, 0, 3);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
