const EDGE_COUNT = 3075;


const VS = `#version 300 es
in vec2 a_pos;
in float a_idx;
uniform float u_time;
uniform float u_pulse;
uniform float u_aspect;
uniform float u_bands[8];
uniform float u_glitch;

float hash11(float n){ return fract(sin(n) * 43758.5453); }

void main(){
  vec2 p = a_pos;

  // Per-vertex jitter — hashed by POSITION (already deduped at 4-decimal
  // precision in the JS data) so vertices shared between segments move
  // identically. The seed never depends on segment/edge index.
  float h1 = hash11(p.x * 311.7 + p.y * 127.1);
  float h2 = hash11(p.x * 731.5 + p.y * 451.3 + 7.0);
  vec2  jit = vec2(h1, h2) - 0.5;
  float amp = 0.0025 + 0.012 * (u_bands[0] + u_bands[2]) + 0.018 * u_pulse;
  jit += vec2(sin(u_time * 1.7 + h1 * 6.28),
              cos(u_time * 1.3 + h2 * 6.28)) * 0.004;
  p += jit * amp;

  // Breathing scale
  float breathe = 1.0 + 0.04 * sin(u_time * 1.4) + 0.03 * u_pulse;
  p *= breathe;

  // Global rotation swing on mids
  float rot = sin(u_time * 0.6) * 0.05 * (1.0 + u_bands[3]);
  float c = cos(rot), s = sin(rot);
  p = mat2(c, -s, s, c) * p;

  // Beat glitch — translate full horizontal slices
  float slice = floor((p.y + 1.0) * 7.0);
  float gh = hash11(slice * 11.7 + floor(u_time * 4.0));
  if (u_pulse > 0.55 && gh > 0.65) {
    p.x += (gh - 0.65) * u_glitch * 1.2;
  }

  // Aspect correction so the rabbit isn't squished horizontally
  p.x /= u_aspect;
  // Fit
  p *= 0.85;

  gl_Position = vec4(p, 0.0, 1.0);
}`;

const FS = `#version 300 es
precision highp float;
out vec4 fragColor;
uniform float u_pulse;
uniform float u_alpha;
void main(){
  vec3 col = vec3(1.0);
  // beat tints toward cyan
  col = mix(col, vec3(0.65, 0.95, 1.0), u_pulse * 0.6);
  fragColor = vec4(col, u_alpha);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw new Error('shader compile failed');
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.bindAttribLocation(prog, 0, 'a_pos');
gl.bindAttribLocation(prog, 1, 'a_idx');
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
  throw new Error('link failed');
}

// Build per-vertex index attribute (parallel to VERTS)
const IDX = new Float32Array(VERT_COUNT);
for (let i = 0; i < VERT_COUNT; i++) IDX[i] = i;

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);

const vboPos = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vboPos);
gl.bufferData(gl.ARRAY_BUFFER, VERTS, gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

const vboIdx = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vboIdx);
gl.bufferData(gl.ARRAY_BUFFER, IDX, gl.STATIC_DRAW);
gl.enableVertexAttribArray(1);
gl.vertexAttribPointer(1, 1, gl.FLOAT, false, 0, 0);

const ibo = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, EDGES, gl.STATIC_DRAW);

const u_time   = gl.getUniformLocation(prog, 'u_time');
const u_pulse  = gl.getUniformLocation(prog, 'u_pulse');
const u_aspect = gl.getUniformLocation(prog, 'u_aspect');
const u_bands  = gl.getUniformLocation(prog, 'u_bands[0]');
const u_glitch = gl.getUniformLocation(prog, 'u_glitch');
const u_alpha  = gl.getUniformLocation(prog, 'u_alpha');

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
  }
}
window.addEventListener('resize', resize);
resize();

let pulse = 0;
function triggerBeat() { pulse = 1.0; }
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); triggerBeat(); }
});
window.addEventListener('mousedown', () => triggerBeat());
window.addEventListener('touchstart', () => triggerBeat(), {passive:true});

const hint = document.getElementById('hint');
setTimeout(() => hint.classList.add('gone'), 3000);

const start = performance.now();
let prev = start;
let nextAutoBeat = 0;
const BPM = 124;
const beatInterval = 60.0 / BPM;

function frame(now) {
  const t = (now - start) * 0.001;
  const dt = (now - prev) * 0.001;
  prev = now;

  if (t >= nextAutoBeat) {
    triggerBeat();
    nextAutoBeat = (nextAutoBeat === 0 ? t : nextAutoBeat) + beatInterval;
    if (nextAutoBeat < t) nextAutoBeat = t + beatInterval;
  }
  const decayPerSec = Math.pow(0.92, 60);
  pulse *= Math.pow(decayPerSec, dt);

  const bands = new Float32Array(8);
  for (let i=0;i<8;i++){
    let v = 0.5 + 0.5*Math.sin(t*(i+1)*0.9 + i*1.3);
    v *= 0.5 + 0.7*Math.max(0, Math.sin(t*2.0 + i*0.5));
    v += pulse * 0.4 * (0.6 + 0.4*Math.sin(i*1.1));
    bands[i] = Math.max(0, Math.min(1, v));
  }

  resize();
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.useProgram(prog);
  gl.uniform1f(u_time, t);
  gl.uniform1f(u_pulse, pulse);
  gl.uniform1f(u_aspect, canvas.width / canvas.height);
  gl.uniform1fv(u_bands, bands);
  gl.uniform1f(u_glitch, 0.18);
  gl.uniform1f(u_alpha, 0.85);

  gl.bindVertexArray(vao);
  gl.drawElements(gl.LINES, EDGE_COUNT * 2, gl.UNSIGNED_SHORT, 0);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
